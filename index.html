<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sorteos Eros</title>
<meta name="description" content="Sorteo en vivo · 100 números · Seguí el tablero en tiempo real">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg-deep:#150826;--bg-panel:#1f1040;--gold:#ffd166;--green:#00ff87;--green-dark:#00994f;
    --pink:#ff3d81;--white:#ffffff;--ink:#1a1030;--lila-texto:#cdbfff;
    --sombra:0 8px 22px rgba(0,0,0,.35);--radio:16px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;overflow:hidden;}
  body{
    font-family:'Inter',sans-serif;color:#fff;
    background:
      radial-gradient(circle at 15% 8%, #2a1454 0%, transparent 45%),
      radial-gradient(circle at 85% 92%, #3a0f4f 0%, transparent 50%),
      radial-gradient(circle at 50% 45%, #1c0c3a 0%, transparent 60%),
      var(--bg-deep);
    -webkit-font-smoothing:antialiased;
  }
  .app{
    height:100vh;height:100dvh;max-width:920px;margin:0 auto;
    padding:clamp(8px,2vw,16px);
    display:flex;flex-direction:column;gap:clamp(6px,1.4vh,12px);
  }

  /* ---------- HEADER ---------- */
  .brand-header{
    flex:0 0 auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    background:linear-gradient(120deg,#2a1454,#170826);
    border-radius:var(--radio);padding:8px 14px;box-shadow:var(--sombra);
  }
  .avatar-wrap{
    width:clamp(38px,7vh,54px);height:clamp(38px,7vh,54px);border-radius:50%;flex-shrink:0;cursor:pointer;
    padding:2px;background:conic-gradient(from 180deg,var(--gold),var(--pink),var(--green),var(--gold));
    animation:girar 6s linear infinite;box-shadow:0 0 14px rgba(255,209,102,.5);
  }
  @keyframes girar{ to{ filter:hue-rotate(360deg); } }
  .avatar-wrap img{width:100%;height:100%;object-fit:cover;border-radius:50%;border:2px solid #170826;display:block;}
  .brand-title{
    font-family:'Baloo 2',sans-serif;font-weight:800;font-size:clamp(16px,3.4vh,26px);
    letter-spacing:.3px;line-height:1;
    background:linear-gradient(90deg,var(--gold),var(--green));
    -webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap;
  }
  .brand-ig{
    display:inline-flex;align-items:center;gap:5px;padding:6px 12px;
    border-radius:30px;font-weight:700;font-size:clamp(10px,1.6vh,12px);color:#fff;text-decoration:none;
    background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);flex-shrink:0;
  }
  .brand-ig svg{width:13px;height:13px;}
  .brand-comprar{
    margin-left:auto;display:inline-flex;align-items:center;gap:6px;padding:8px 16px;
    border-radius:30px;font-weight:800;font-size:clamp(11px,1.7vh,13px);color:#04150a;text-decoration:none;
    background:linear-gradient(90deg,#00d4a0,#ffd166);flex-shrink:0;font-family:'Baloo 2',sans-serif;
    animation:pulseComprar 1.8s ease-in-out infinite;
  }
  @keyframes pulseComprar{
    0%,100%{ transform:scale(1); box-shadow:0 0 0 rgba(0,212,160,0); }
    50%{ transform:scale(1.22); box-shadow:0 0 26px rgba(0,212,160,.75); }
  }

  /* ---------- CARTEL + PREMIO (combinados) ---------- */
  .cartel{
    flex:0 0 auto;position:relative;padding:10px 14px;border-radius:var(--radio);overflow:hidden;
    background:linear-gradient(160deg,#2a1454,#170826);
    box-shadow:0 0 30px rgba(255,209,102,.12);
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  }
  .cartel-texto{flex:1;min-width:0;}
  .cartel-eyebrow{
    font-family:'Baloo 2',sans-serif;font-weight:700;font-size:10px;letter-spacing:1.6px;
    color:var(--pink);text-transform:uppercase;margin-bottom:2px;
  }
  .cartel-letras{display:flex;flex-wrap:wrap;gap:1px;font-family:'Baloo 2',sans-serif;line-height:1.1;}
  .cartel-letras .letra{
    display:inline-block;font-weight:800;font-size:clamp(14px,2.6vh,22px);color:var(--gold);
    text-shadow:0 0 10px rgba(255,209,102,.6);animation:rebote 1.4s ease-in-out infinite;
  }
  @keyframes rebote{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
  .cartel-desc{font-size:clamp(10px,1.6vh,12px);color:var(--lila-texto);margin-top:2px;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;
    cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px;}
  .galeria{display:flex;gap:6px;flex-shrink:0;overflow-x:auto;max-width:40%;}
  .galeria img{
    width:clamp(32px,6vh,46px);height:clamp(32px,6vh,46px);object-fit:cover;border-radius:10px;cursor:pointer;
    border:2px solid var(--gold);flex-shrink:0;
  }
  .galeria .vacio{color:var(--lila-texto);font-size:10px;}

  /* ---------- MARQUESINA / GANADOR ---------- */
  .marquee{
    flex:0 0 auto;position:relative;padding:8px 14px;border-radius:var(--radio);
    background:linear-gradient(160deg,#2a1454,#170826);
    box-shadow:0 0 30px rgba(255,209,102,.14);
    overflow:hidden;text-align:center;min-height:clamp(38px,6vh,54px);
    display:flex;align-items:center;justify-content:center;
  }
  .marquee-content{font-family:'Baloo 2',sans-serif;width:100%;}
  .idle-text{font-size:clamp(12px,2.2vh,18px);font-weight:700;color:var(--gold);letter-spacing:.5px;}
  .sorteando-text{font-size:clamp(12px,2.2vh,18px);font-weight:700;color:var(--pink);letter-spacing:.5px;}
  .countdown-text{
    font-size:clamp(12px,2.4vh,20px);font-weight:800;color:#fff;letter-spacing:.5px;
    animation:parpadeo 1s ease-in-out infinite;
  }
  @keyframes parpadeo{0%,100%{opacity:1;}50%{opacity:.55;}}
  body.flash::after{
    content:'';position:fixed;inset:0;z-index:60;pointer-events:none;
    background:radial-gradient(circle,rgba(0,255,135,.55),rgba(255,209,102,.25) 55%,transparent 75%);
    animation:flashPop .7s ease-out forwards;
  }
  @keyframes flashPop{0%{opacity:0;}15%{opacity:1;}100%{opacity:0;}}
  .marquee.festejo{animation:sacudida .4s ease-in-out 4;box-shadow:0 0 60px rgba(0,255,135,.5),0 0 0 3px var(--gold);}
  @keyframes sacudida{0%,100%{transform:translateX(0) scale(1);}25%{transform:translateX(-4px) scale(1.015);}75%{transform:translateX(4px) scale(1.015);}}
  .win-line{display:flex;flex-wrap:wrap;justify-content:center;gap:4px;}
  .win-line .letter{display:inline-block;font-weight:800;animation:rebote 1s ease-in-out infinite;}
  .win-title .letter{font-size:clamp(12px,2.4vh,20px);color:var(--pink);}
  .win-name .letter{font-size:clamp(15px,3vh,28px);color:var(--green);}

  /* ---------- TABLERO (ocupa el resto de la pantalla) ---------- */
  .board-card{
    flex:1 1 auto;min-height:0;background:var(--bg-panel);border-radius:var(--radio);
    padding:10px;box-shadow:var(--sombra);display:flex;flex-direction:column;gap:4px;min-width:0;
  }
  .board-wrap{flex:1 1 auto;min-height:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .tablero{display:grid;gap:5px;}
  .casillero{
    border-radius:6px;background:#ffffff;border:1.5px solid #e5ddff;color:var(--ink);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-weight:800;transition:transform .08s ease,background .15s ease,box-shadow .15s ease;
    overflow:hidden;
  }
  .casillero .num{font-size:.72em;line-height:1;}
  .casillero .nom{font-size:.38em;margin-top:1px;opacity:.75;color:#5a4a8a;max-width:96%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .casillero.vendido{
    background:linear-gradient(150deg,#0d5c38,#0a3f27);border-color:#0a3f27;color:#fff;cursor:pointer;
  }
  .casillero.vendido .nom{color:#c9f7dd;opacity:1;}
  .casillero.vendido:active{transform:scale(.94);}
  .casillero.encendido{
    background:radial-gradient(circle,var(--pink),#8a1148);border-color:var(--pink);color:#fff;
    box-shadow:0 0 16px var(--pink);transform:scale(1.15);z-index:2;
  }
  .casillero.encendido .nom{color:#ffe3ef;}
  .casillero.ganador-final{
    background:radial-gradient(circle,var(--green),var(--green-dark));border-color:var(--gold);color:#04150a;
    box-shadow:0 0 20px var(--green),0 0 0 3px rgba(255,209,102,.6);
    animation:pulseWinner 1s ease-in-out infinite;z-index:2;
  }
  .casillero.ganador-final .nom{color:#04150a;}
  @keyframes pulseWinner{0%,100%{transform:scale(1.08);}50%{transform:scale(1.16);}}
  .mensaje-final{text-align:center;color:var(--lila-texto);font-size:clamp(9px,1.4vh,11px);flex:0 0 auto;}

  /* ---------- LIGHTBOX ---------- */
  .lightbox{position:fixed;inset:0;background:rgba(8,4,18,.92);display:none;align-items:center;justify-content:center;z-index:50;padding:24px;}
  .lightbox.show{display:flex;}
  .lightbox img{max-width:min(90vw,700px);max-height:85vh;border-radius:16px;box-shadow:0 0 40px rgba(255,209,102,.35);}
  .lightbox-close{position:absolute;top:18px;right:22px;color:#fff;font-size:1.8rem;background:none;border:none;cursor:pointer;}
  .ficha-numero{
    background:linear-gradient(160deg,#2a1454,#170826);border-radius:20px;padding:28px 34px;text-align:center;
    box-shadow:0 0 40px rgba(0,255,135,.25);border:1px solid rgba(0,255,135,.3);min-width:240px;
  }
  .ficha-num{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:2rem;color:var(--gold);}
  .ficha-label{font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--lila-texto);margin-top:10px;}
  .ficha-nombre{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:1.3rem;color:var(--green);margin-top:4px;}
  .ficha-desc{
    background:linear-gradient(160deg,#2a1454,#170826);border-radius:20px;padding:28px 30px;text-align:left;
    box-shadow:0 0 40px rgba(255,209,102,.25);border:1px solid rgba(255,209,102,.3);
    max-width:min(90vw,520px);max-height:80vh;overflow-y:auto;
  }
  .ficha-desc .ficha-label{text-align:center;margin-top:0;margin-bottom:10px;}
  .ficha-desc-texto{font-size:.95rem;line-height:1.5;color:#fff;white-space:pre-wrap;}

  .confetti-piece{position:fixed;top:-40px;font-size:22px;z-index:70;pointer-events:none;animation:caer linear forwards;}
  @keyframes caer{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(105vh) rotate(360deg);opacity:.9;}}
</style>
</head>
<body>

<div class="app">

  <div class="brand-header">
    <div class="avatar-wrap" id="avatar-wrap">
      <img src="foto-perfil.jpg" alt="Foto del organizador" id="avatar-img">
    </div>
    <div class="brand-title">Sorteos Eros</div>
    <a class="brand-ig" id="ig-link" href="https://instagram.com/eros_sorteos" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.2c3.2 0 3.6 0 4.85.07 3.25.15 4.77 1.69 4.92 4.92.06 1.25.07 1.63.07 4.81s-.01 3.56-.07 4.81c-.15 3.23-1.67 4.77-4.92 4.92-1.25.06-1.62.07-4.85.07s-3.6-.01-4.85-.07c-3.26-.15-4.77-1.7-4.92-4.92-.06-1.25-.07-1.63-.07-4.81s.01-3.56.07-4.81c.15-3.23 1.67-4.77 4.92-4.92C8.4 2.21 8.8 2.2 12 2.2Zm0 1.8c-3.15 0-3.5.01-4.73.07-2.27.1-3.4 1.24-3.5 3.5-.06 1.23-.07 1.58-.07 4.73s.01 3.5.07 4.73c.1 2.27 1.23 3.4 3.5 3.5 1.23.06 1.58.07 4.73.07s3.5-.01 4.73-.07c2.27-.1 3.4-1.23 3.5-3.5.06-1.23.07-1.58.07-4.73s-.01-3.5-.07-4.73c-.1-2.26-1.23-3.4-3.5-3.5C15.5 4.01 15.15 4 12 4Zm0 3.6a4.4 4.4 0 1 1 0 8.8 4.4 4.4 0 0 1 0-8.8Zm0 1.8a2.6 2.6 0 1 0 0 5.2 2.6 2.6 0 0 0 0-5.2Zm4.6-2a1.03 1.03 0 1 1 0 2.06 1.03 1.03 0 0 1 0-2.06Z"/></svg>
      <span id="ig-user">@eros_sorteos</span>
    </a>
    <a class="brand-comprar" href="comprar.html">🎟️ Comprar</a>
  </div>

  <div class="cartel" id="cartel">
    <div class="cartel-texto">
      <div class="cartel-eyebrow">🎁 Sorteamos</div>
      <div class="cartel-letras" id="cartel-letras"></div>
      <div class="cartel-desc" id="premio-desc"></div>
    </div>
    <div class="galeria" id="galeria"></div>
  </div>

  <div class="marquee" id="marquee">
    <div class="marquee-content" id="marquee-content">
      <div class="idle-text">🎪 ESPERANDO SORTEO 🎪</div>
    </div>
  </div>

  <div class="board-card">
    <div class="board-wrap" id="board-wrap">
      <div class="tablero" id="tablero"></div>
    </div>
    <p class="mensaje-final">El sorteo se realizará una vez vendidos los 100 números.</p>
  </div>

</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close">&times;</button>
  <img id="lightbox-img" src="" alt="Foto del premio">
</div>

<div class="lightbox" id="modal-nombre">
  <button class="lightbox-close" id="mn-cerrar">&times;</button>
  <div class="ficha-numero">
    <div class="ficha-num" id="mn-numero">#--</div>
    <div class="ficha-label">Comprado por</div>
    <div class="ficha-nombre" id="mn-nombre">—</div>
  </div>
</div>

<div class="lightbox" id="modal-desc">
  <button class="lightbox-close" id="md-cerrar">&times;</button>
  <div class="ficha-desc">
    <div class="ficha-label">🎁 Sobre el premio</div>
    <div class="ficha-desc-texto" id="md-texto">—</div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://pzqrakjhnclqhmklrixn.supabase.co";
const SUPABASE_KEY = "sb_publishable_rc59pP-MBCuwMpr3zzPP4A_A5gVS1d_";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let sorteoActual = null;
let numerosActuales = [];
let animando = false;

const tableroEl = document.getElementById('tablero');
const boardWrap = document.getElementById('board-wrap');
const marqueeContent = document.getElementById('marquee-content');

function escapeHtml(str){ const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
function lettersHtml(text, cssClass){
  return text.split('').map((ch,i)=>{
    const c = ch === ' ' ? '&nbsp;' : escapeHtml(ch);
    return `<span class="letter ${cssClass}" style="animation-delay:${i*0.05}s">${c}</span>`;
  }).join('');
}
function letrasCartel(text){
  return text.split('').map((ch,i)=>{
    const c = ch === ' ' ? '&nbsp;' : escapeHtml(ch);
    return `<span class="letra" style="animation-delay:${i*0.06}s">${c}</span>`;
  }).join('');
}

// ---------- Tablero (se autoajusta para no generar scroll) ----------
function construirTablero(){
  tableroEl.innerHTML = '';
  for(let n=1;n<=100;n++){
    const div = document.createElement('div');
    div.className = 'casillero';
    div.id = 'casillero-'+n;
    div.innerHTML = `<span class="num">${n}</span><span class="nom"></span>`;
    tableroEl.appendChild(div);
  }
  fitGrid();
}
function fitGrid(){
  const w = boardWrap.clientWidth;
  const h = boardWrap.clientHeight;
  if(w < 10 || h < 10) return;
  const gap = 5;
  const cell = Math.floor(Math.min((w - gap*9)/10, (h - gap*9)/10));
  const size = Math.max(cell, 12);
  tableroEl.style.gridTemplateColumns = `repeat(10, ${size}px)`;
  tableroEl.style.gridAutoRows = `${size}px`;
  tableroEl.style.gap = gap+'px';
}
construirTablero();
new ResizeObserver(fitGrid).observe(boardWrap);
window.addEventListener('resize', fitGrid);
window.addEventListener('orientationchange', ()=> setTimeout(fitGrid,200));

function pintarNumeros(){
  numerosActuales.forEach(n=>{
    const el = document.getElementById('casillero-'+n.numero);
    if(!el) return;
    const yaVendido = el.classList.contains('vendido');
    el.classList.toggle('vendido', !!n.vendido);
    el.querySelector('.nom').textContent = n.vendido ? (n.nombre_completo || '') : '';
    if(n.vendido && !yaVendido){
      el.onclick = ()=> abrirFichaComprador(n.numero, n.nombre_completo);
    }
    if(!n.vendido){
      el.onclick = null;
    }
  });
}

function abrirFichaComprador(numero, nombre){
  document.getElementById('mn-numero').textContent = '#'+numero;
  document.getElementById('mn-nombre').textContent = nombre || 'Sin nombre cargado';
  document.getElementById('modal-nombre').classList.add('show');
}
document.getElementById('mn-cerrar').addEventListener('click', ()=>{
  document.getElementById('modal-nombre').classList.remove('show');
});
document.getElementById('modal-nombre').addEventListener('click', (e)=>{
  if(e.target.id==='modal-nombre') document.getElementById('modal-nombre').classList.remove('show');
});

document.getElementById('premio-desc').addEventListener('click', ()=>{
  const texto = document.getElementById('premio-desc').textContent.trim();
  if(!texto) return;
  document.getElementById('md-texto').textContent = texto;
  document.getElementById('modal-desc').classList.add('show');
});
document.getElementById('md-cerrar').addEventListener('click', ()=>{
  document.getElementById('modal-desc').classList.remove('show');
});
document.getElementById('modal-desc').addEventListener('click', (e)=>{
  if(e.target.id==='modal-desc') document.getElementById('modal-desc').classList.remove('show');
});

// ---------- Carga inicial ----------
async function cargarConfig(){
  const { data } = await sb.from('config').select('*').eq('id',1).single();
  if(data){
    document.getElementById('ig-user').textContent = '@'+data.instagram_usuario;
    document.getElementById('ig-link').href = data.instagram_url;
    if(data.avatar_url){
      document.getElementById('avatar-img').src = data.avatar_url;
    }
  }
}

async function cargarSorteoActivo(){
  const { data } = await sb.from('sorteos')
    .select('*').in('estado',['activo','en_curso']).order('created_at',{ascending:false}).limit(1).maybeSingle();
  if(!data) return;
  sorteoActual = data;
  document.getElementById('cartel-letras').innerHTML = letrasCartel(data.premio_nombre || 'Premio sorpresa');
  document.getElementById('premio-desc').textContent = data.premio_descripcion || '';
  await cargarFotos();
  await cargarNumeros();
  actualizarGanadorUI();
  suscribirRealtime();
}

async function cargarFotos(){
  const galeria = document.getElementById('galeria');
  galeria.innerHTML = '';
  const { data } = await sb.from('premio_fotos').select('*').eq('sorteo_id', sorteoActual.id).order('orden');
  if(!data || data.length===0){
    galeria.innerHTML = '<span class="vacio">Sin fotos</span>';
    return;
  }
  data.forEach(f=>{
    const img = document.createElement('img');
    img.src = f.url; img.alt = 'Foto del premio';
    img.addEventListener('click', ()=> abrirLightbox(f.url));
    galeria.appendChild(img);
  });
}

async function cargarNumeros(){
  const { data } = await sb.from('numeros_publicos').select('*').eq('sorteo_id', sorteoActual.id).order('numero');
  numerosActuales = data || [];
  pintarNumeros();
}

function actualizarGanadorUI(){
  if(sorteoActual.estado === 'en_curso' && sorteoActual.sorteo_iniciado_at){
    const inicioMs = new Date(sorteoActual.sorteo_iniciado_at).getTime();
    const finShow = inicioMs + DURACION_SHOW_MS;
    if(Date.now() >= finShow){
      // El minuto del show ya pasó hace rato: mostramos el resultado directo.
      if(sorteoActual.ganador_numero) mostrarGanadorFinal(sorteoActual.ganador_numero, sorteoActual.ganador_nombre, false);
    } else if(!animando){
      // Estamos DENTRO del minuto del show (recién arrancó o alguien recargó
      // a mitad de camino): corremos la secuencia desde el punto que toca.
      manejarSecuenciaSorteo(inicioMs);
    }
  }
}

// ---------- Lightbox ----------
function abrirLightbox(src){
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('show');
}
document.getElementById('lightbox-close').addEventListener('click', ()=>{
  document.getElementById('lightbox').classList.remove('show');
});
document.getElementById('lightbox').addEventListener('click', (e)=>{
  if(e.target.id==='lightbox') document.getElementById('lightbox').classList.remove('show');
});
document.getElementById('avatar-wrap').addEventListener('click', ()=>{
  abrirLightbox(document.getElementById('avatar-img').src);
});

// ---------- Secuencia del show en vivo ----------
// La luz rebota y el contador baja AL MISMO TIEMPO, durante el minuto entero.
// Todo se calcula contra la hora real (Date.now()), no contra un timer local,
// así cualquiera que esté mirando -aunque recién entre o recargue la página-
// ve exactamente el mismo momento del show que los demás. No hace falta
// recargar la página en ningún momento: el nombre del ganador aparece solo,
// en vivo, apenas se corta el conteo.
const DURACION_SHOW_MS = 60000;      // 1 minuto: luz + contador juntos
const INTERVALO_LUZ_MS = 80;         // velocidad CONSTANTE de la luz (no se acelera ni frena)

// ---------- Música del sorteo ----------
async function elegirYReproducirMusica(){
  try{
    const { data, error } = await sb.storage.from('audio').list();
    if(error || !data || !data.length) return;
    const archivos = data.filter(f => f.name && !f.name.startsWith('.'));
    if(!archivos.length) return;
    const elegido = archivos[Math.floor(Math.random() * archivos.length)];
    const { data: urlData } = sb.storage.from('audio').getPublicUrl(elegido.name);
    const audio = document.getElementById('audio-sorteo');
    audio.src = urlData.publicUrl;
    audio.currentTime = 0;
    audio.volume = 0.6;
    await audio.play();
  }catch(e){
    // Los navegadores bloquean el autoplay con sonido si la persona todavía
    // no interactuó con la página. No es un error grave: el show sigue
    // andando igual, simplemente sin música en ese caso puntual.
    console.warn('No se pudo reproducir la música automáticamente:', e);
  }
}
function detenerMusica(){
  const audio = document.getElementById('audio-sorteo');
  audio.pause();
  audio.currentTime = 0;
}

async function manejarSecuenciaSorteo(inicioMs){
  animando = true;
  const fin = inicioMs + DURACION_SHOW_MS;
  if(Date.now() < fin){
    elegirYReproducirMusica();
    await correrShowEnVivo(fin);
    detenerMusica();
  }
  await mostrarResultadoFinal();
  animando = false;
}

let ultimoResaltado = null;
function resaltarAlAzar(lista){
  if(ultimoResaltado){
    document.getElementById('casillero-'+ultimoResaltado)?.classList.remove('encendido');
  }
  const num = lista[Math.floor(Math.random()*lista.length)];
  const el = document.getElementById('casillero-'+num);
  if(el) el.classList.add('encendido');
  ultimoResaltado = num;
}

function correrShowEnVivo(fin){
  return new Promise(async resolve=>{
    // El ganador ya quedó guardado en Supabase apenas el admin tocó "Sortear";
    // lo traemos ahora para que la luz "aterrice" de verdad sobre él al cortar,
    // en vez de saltar a otro casillero al final.
    const { data } = await sb.from('sorteos').select('*').eq('id', sorteoActual.id).single();
    sorteoActual = data;
    const numeroGanador = data?.ganador_numero;
    const vendidos = numerosActuales.filter(n=>n.vendido).map(n=>n.numero);
    if(vendidos.length===0 || !numeroGanador){ resolve(); return; }

    let ultimoSegundoMostrado = null;
    const id = setInterval(()=>{
      const restanteMs = fin - Date.now();

      if(restanteMs <= INTERVALO_LUZ_MS){
        clearInterval(id);
        // Corte en seco: apaga la luz de recorrido justo acá, sin transición.
        if(ultimoResaltado) document.getElementById('casillero-'+ultimoResaltado)?.classList.remove('encendido');
        resolve();
        return;
      }

      resaltarAlAzar(vendidos);

      const seg = Math.ceil(restanteMs/1000);
      if(seg !== ultimoSegundoMostrado){
        ultimoSegundoMostrado = seg;
        const mm = Math.floor(seg/60);
        const ss = String(seg%60).padStart(2,'0');
        marqueeContent.innerHTML = `<div class="countdown-text">🔴 EN VIVO · SORTEANDO · ${mm}:${ss}</div>`;
      }
    }, INTERVALO_LUZ_MS);
  });
}

async function mostrarResultadoFinal(){
  const { data } = await sb.from('sorteos').select('*').eq('id', sorteoActual.id).single();
  sorteoActual = data;
  if(data && data.ganador_numero){
    mostrarGanadorFinal(data.ganador_numero, data.ganador_nombre, true);
  } else {
    marqueeContent.innerHTML = '<div class="idle-text">🎪 ESPERANDO SORTEO 🎪</div>';
  }
}

function mostrarGanadorFinal(numero, nombre, festejar){
  document.querySelectorAll('.casillero.ganador-final').forEach(el=>el.classList.remove('ganador-final'));
  const el = document.getElementById('casillero-'+numero);
  if(el) el.classList.add('ganador-final');
  marqueeContent.innerHTML = `
    <div class="win-line win-title">${lettersHtml('🎉 GANADOR 🎉','')}</div>
    <div class="win-line win-name">${lettersHtml('#'+numero+' '+(nombre||''),'')}</div>
  `;
  if(festejar) lanzarFestejo();
}

let confettiIntervalId = null;
function lanzarFestejo(){
  document.body.classList.add('flash');
  setTimeout(()=> document.body.classList.remove('flash'), 700);
  document.querySelector('.marquee').classList.add('festejo');
  setTimeout(()=> document.querySelector('.marquee').classList.remove('festejo'), 2200);
  if(confettiIntervalId) clearInterval(confettiIntervalId);
  lanzarConfeti();
  setTimeout(lanzarConfeti, 500);
  confettiIntervalId = setInterval(lanzarConfeti, 600);
}

function lanzarConfeti(){
  const emojis = ['🎉','🎊','🥳','✨','🍾','🎈','🪅'];
  const total = 40;
  for(let i=0;i<total;i++){
    setTimeout(()=>{
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      piece.style.left = Math.random()*100 + 'vw';
      const dur = 2.5 + Math.random()*2;
      piece.style.animationDuration = dur + 's';
      document.body.appendChild(piece);
      setTimeout(()=>piece.remove(), dur*1000 + 200);
    }, i*40);
  }
}

// ---------- Realtime ----------
let canal = null;
function suscribirRealtime(){
  if(canal) sb.removeChannel(canal);
  canal = sb.channel('sorteo-'+sorteoActual.id)
    .on('postgres_changes', { event:'*', schema:'public', table:'numeros', filter:`sorteo_id=eq.${sorteoActual.id}` }, payload=>{
      const row = payload.new;
      if(!row) return;
      const idx = numerosActuales.findIndex(n=>n.numero===row.numero);
      const nuevo = { id:row.id, sorteo_id:row.sorteo_id, numero:row.numero, vendido:row.vendido, nombre_completo:row.nombre_completo };
      if(idx>=0) numerosActuales[idx] = nuevo; else numerosActuales.push(nuevo);
      pintarNumeros();
    })
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'sorteos', filter:`id=eq.${sorteoActual.id}` }, payload=>{
      const row = payload.new;
      sorteoActual = row;
      if(row.sorteo_en_curso && row.sorteo_iniciado_at && !animando){ manejarSecuenciaSorteo(new Date(row.sorteo_iniciado_at).getTime()); }
      if(row.estado === 'finalizado'){ setTimeout(()=> location.reload(), 800); }
    })
    .on('postgres_changes', { event:'*', schema:'public', table:'premio_fotos', filter:`sorteo_id=eq.${sorteoActual.id}` }, ()=>{
      cargarFotos();
    })
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'config', filter:'id=eq.1' }, payload=>{
      if(payload.new?.avatar_url){ document.getElementById('avatar-img').src = payload.new.avatar_url; }
    })
    .subscribe();
}

// ---------- Init ----------
(async function init(){
  await cargarConfig();
  await cargarSorteoActivo();
  try{
    const { error } = await sb.rpc('incrementar_visita');
    if(error) console.error('No se pudo contar la visita:', error);
  }catch(e){
    console.error('Error de red al contar la visita:', e);
  }
})();
</script>
